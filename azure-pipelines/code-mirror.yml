parameters:
  - name: forcePush
    displayName: 'Force Push (Manual runs only)'
    type: boolean
    default: false
    
trigger:
    branches:
        include:
            - main
            - release/*

resources:
    repositories:
        - repository: eng
          type: git
          name: engineering
          ref: refs/tags/release

variables:
    - template: ci/variables/cfs.yml@eng

extends:
  template: ci/code-mirror.yml@eng
  parameters:
    # Pass -f flag when forcePush is enabled and it's a manual run
    ${{ if and(eq(parameters.forcePush, true), eq(variables['Build.Reason'], 'Manual')) }}:
      extraPushArgs: '-f'
    ${{ else }}:
      extraPushArgs: ''
