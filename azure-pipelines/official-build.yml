parameters:
    - name: IsPrerelease
      type: boolean
      default: true

trigger:
    batch: true
    branches:
        include:
            - main

# CI only, does not trigger on PRs.
pr: none

schedules:
    - cron: '30 10 * * *'
      displayName: Nightly build
      always: true
      branches:
          include:
              - main

resources:
    repositories:
        - repository: 1es
          type: git
          name: 1ESPipelineTemplates/1ESPipelineTemplates
          ref: refs/tags/release

variables:
    - group: azure-functions-skills-release

extends:
    template: v1/1ES.Official.PipelineTemplate.yml@1es
    parameters:
        pool:
            name: 1es-pool-azfunc
            image: 1es-windows-2022
            os: windows

        sdl:
            codeql:
                runSourceLanguagesInSourceAnalysis: true

        stages:
            - stage: WindowsUnitTests
              dependsOn: []
              jobs:
                  - template: /azure-pipelines/templates/test.yml@self
                    parameters:
                        npmRegistry: 'https://pkgs.dev.azure.com/azfunc/internal/_packaging/upstream/npm/registry/'

            - stage: LinuxUnitTests
              dependsOn: []
              jobs:
                  - template: /azure-pipelines/templates/test.yml@self
                    parameters:
                        npmRegistry: 'https://pkgs.dev.azure.com/azfunc/internal/_packaging/upstream/npm/registry/'
              pool:
                  name: 1es-pool-azfunc
                  image: 1es-ubuntu-22.04
                  os: linux

            - stage: Build
              dependsOn: []
              jobs:
                  - template: /azure-pipelines/templates/build.yml@self
                    parameters:
                        IsPrerelease: ${{ parameters.IsPrerelease }}
                        npmRegistry: 'https://pkgs.dev.azure.com/azfunc/internal/_packaging/upstream/npm/registry/'
