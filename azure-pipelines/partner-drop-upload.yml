trigger: none
pr: none

resources:
    repositories:
        - repository: 1es
          type: git
          name: 1ESPipelineTemplates/1ESPipelineTemplates
          ref: refs/tags/release
        - repository: eng
          type: git
          name: engineering
          ref: refs/heads/main
    pipelines:
        - pipeline: officialBuild
          project: internal
          source: functions-skills.official
          branch: main

variables:
    - group: azure-functions-skills-release

extends:
    template: v1/1ES.Official.PipelineTemplate.yml@1es
    parameters:
        pool:
            name: 1es-pool-azfunc
            image: 1es-ubuntu-22.04
            os: linux
        sdl:
            sourceAnalysisPool:
                name: 1es-pool-azfunc
                image: 1es-windows-2022
                os: windows
            codeql:
                runSourceLanguagesInSourceAnalysis: true

        stages:
            - stage: UploadPartnerDrop
              displayName: 'Upload package to partner drops'
              jobs:
                  - template: /ci/release-npm-package.yml@eng
                    parameters:
                        artifact:
                            name: drop
                            pipeline: officialBuild
                        partnerDrop:
                            serviceConnection: $(PartnerBlobAzureServiceConnection)
                            targetFolder: azure-functions/azure-functions-skills/{version}
                            runPipeline: false
