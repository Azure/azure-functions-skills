parameters:
    - name: OverwriteExistingBlob
      displayName: 'Overwrite existing blob'
      type: boolean
      default: false

trigger: none
pr: none

resources:
    repositories:
        - repository: 1es
          type: git
          name: 1ESPipelineTemplates/1ESPipelineTemplates
          ref: refs/tags/release
    pipelines:
        - pipeline: officialBuild
          project: internal
          source: functions-skills.official
          branch: main

variables:
    - group: azure-functions-skills-release

extends:
    template: v1/1ES.Official.PipelineTemplate.yml@1es
    parameters:
        pool:
            name: 1es-pool-azfunc
            image: 1es-ubuntu-22.04
            os: linux
        sdl:
            sourceAnalysisPool:
                name: 1es-pool-azfunc
                image: 1es-windows-2022
                os: windows
            codeql:
                runSourceLanguagesInSourceAnalysis: true

        stages:
            - stage: UploadPartnerDrop
              displayName: 'Upload package to partner drops'
              jobs:
                  - job: UploadPartnerDrop
                    displayName: 'Upload official build package'
                    steps:
                        - download: officialBuild
                          artifact: drop
                        - task: AzureCLI@2
                          displayName: 'Upload package to azuresdkpartnerdrops'
                          inputs:
                              azureSubscription: '$(PartnerBlobAzureServiceConnection)'
                              scriptType: pscore
                              scriptLocation: inlineScript
                              inlineScript: |
                                  $ErrorActionPreference = 'Stop'

                                  $dropPath = '$(Pipeline.Workspace)/officialBuild/drop'
                                  $files = Get-ChildItem $dropPath -Filter '*.tgz'
                                  if ($files.Count -ne 1) {
                                      throw "Expected one .tgz package in $dropPath, found $($files.Count)."
                                  }

                                  $package = $files[0]
                                  if ($package.Name -notmatch '^azure-functions-skills-(?<version>\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?)\.tgz$') {
                                      throw "Package name did not match the expected npm pack format: $($package.Name)"
                                  }

                                  $version = $Matches.version
                                  $blobName = "azure-functions/azure-functions-skills/$version/$($package.Name)"
                                  $overwrite = '${{ lower(parameters.OverwriteExistingBlob) }}'

                                  Write-Host "Uploading $($package.FullName)"
                                  Write-Host "Target: $(PartnerBlobStorageAccount)/$(PartnerBlobContainer)/$blobName"

                                  $existing = az storage blob exists `
                                      --auth-mode login `
                                      --account-name '$(PartnerBlobStorageAccount)' `
                                      --container-name '$(PartnerBlobContainer)' `
                                      --name $blobName `
                                      --query exists `
                                      --output tsv

                                  if ($existing -eq 'true' -and $overwrite -ne 'true') {
                                      throw "Blob already exists: $blobName. Re-run with OverwriteExistingBlob=true only if replacing this package is intentional."
                                  }

                                  az storage blob upload `
                                      --auth-mode login `
                                      --account-name '$(PartnerBlobStorageAccount)' `
                                      --container-name '$(PartnerBlobContainer)' `
                                      --name $blobName `
                                      --file $package.FullName `
                                      --overwrite $overwrite
