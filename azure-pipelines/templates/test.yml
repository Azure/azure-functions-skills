jobs:
    - job: UnitTests

      strategy:
          matrix:
              Node18:
                  NODE_VERSION: '18.x'
              Node20:
                  NODE_VERSION: '20.x'
              Node22:
                  NODE_VERSION: '22.x'

      steps:
          - task: NodeTool@0
            inputs:
                versionSpec: $(NODE_VERSION)
            displayName: 'Install Node.js'
          - script: npm ci
            displayName: 'npm ci'
          - script: npm run lint
            displayName: 'npm run lint'
          - script: npm run typecheck
            displayName: 'npm run typecheck'
          - script: npm test
            displayName: 'Run unit tests'
