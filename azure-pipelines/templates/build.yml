parameters:
    - name: IsPrerelease
      type: boolean
      default: true
    - name: npmRegistry
      type: string
      default: 'https://pkgs.dev.azure.com/azfunc/internal/_packaging/upstream/npm/registry/'

jobs:
    - job:
      templateContext:
          outputs:
              - output: pipelineArtifact
                path: $(Build.ArtifactStagingDirectory)/dropOutput
                artifact: drop
                sbomBuildDropPath: '$(Build.ArtifactStagingDirectory)/dropInput'
                sbomPackageName: 'Azure Functions Skills CLI'
                sbomBuildComponentPath: '$(Build.SourcesDirectory)/node_modules'
      steps:
          - task: NodeTool@0
            inputs:
                versionSpec: 22.x
            displayName: 'Install Node.js'
          - pwsh: |
                @(
                  'registry=${{ parameters.npmRegistry }}'
                  'always-auth=true'
                ) | Set-Content .npmrc
            displayName: 'Configure npm registry'
          - task: npmAuthenticate@0
            inputs:
                workingFile: .npmrc
            displayName: 'Authenticate npm feed'
          - script: npm ci --include=optional
            displayName: 'npm ci'
          - script: npm audit --production
            displayName: 'Run vulnerability scan'
          - script: npm run build
            displayName: 'npm run build'
          - task: CopyFiles@2
            displayName: 'Copy files to staging'
            inputs:
                sourceFolder: '$(Build.SourcesDirectory)'
                contents: |
                    bin/**
                    lib/**
                    src/**
                    templates/**
                    LICENSE
                    package.json
                    README.md
                   dist/plugin/**
               targetFolder: '$(Build.ArtifactStagingDirectory)/dropInput'
               cleanTargetFolder: true
          - pwsh: |
                $ErrorActionPreference = 'Stop'

                $instrumentationKey = $env:APPLICATIONINSIGHTS_INSTRUMENTATION_KEY
                if ([string]::IsNullOrWhiteSpace($instrumentationKey) -or $instrumentationKey.StartsWith('$(')) {
                    Write-Host 'ApplicationInsightsInstrumentationKey is not configured; telemetry package config will keep the placeholder.'
                    exit 0
                }

                $placeholder = '__APPLICATIONINSIGHTS_INSTRUMENTATION_KEY__'
                $configPaths = @(
                    '$(Build.ArtifactStagingDirectory)/dropInput/templates/hooks/telemetry.config.json',
                    '$(Build.ArtifactStagingDirectory)/dropInput/dist/plugin/azure-functions-skills/hooks/telemetry.config.json'
                )

                foreach ($configPath in $configPaths) {
                    if (-not (Test-Path $configPath)) {
                        throw "Telemetry config was not found at $configPath"
                    }

                    $content = Get-Content -Raw -Path $configPath
                    if (-not $content.Contains($placeholder)) {
                        throw "Telemetry config placeholder was not found in $configPath."
                    }

                    $content.Replace($placeholder, $instrumentationKey) |
                        Set-Content -Path $configPath -Encoding utf8NoBOM
                }
                Write-Host 'Injected Application Insights instrumentation key into package telemetry config.'
            displayName: 'Inject telemetry instrumentation key'
            env:
                APPLICATIONINSIGHTS_INSTRUMENTATION_KEY: $(ApplicationInsightsInstrumentationKey)
          - script: npm prune --production
            displayName: 'npm prune --production'
          - script: npm pack --ignore-scripts
            displayName: 'npm pack'
            workingDirectory: '$(Build.ArtifactStagingDirectory)/dropInput'
          - script: mkdir dropOutput && mv dropInput/*.tgz dropOutput
            displayName: 'Move package to dropOutput'
            workingDirectory: '$(Build.ArtifactStagingDirectory)'
