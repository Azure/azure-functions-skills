parameters:
    - name: IsPrerelease
      type: boolean
      default: true
    - name: npmRegistry
      type: string
      default: 'https://pkgs.dev.azure.com/azfunc/internal/_packaging/upstream/npm/registry/'

jobs:
    - job:
      templateContext:
          outputs:
              - output: pipelineArtifact
                path: $(Build.ArtifactStagingDirectory)/dropOutput
                artifact: drop
                sbomBuildDropPath: '$(Build.ArtifactStagingDirectory)/dropInput'
                sbomPackageName: 'Azure Functions Skills CLI'
                sbomBuildComponentPath: '$(Build.SourcesDirectory)/node_modules'
      steps:
          - task: NodeTool@0
            inputs:
                versionSpec: 22.x
            displayName: 'Install Node.js'
          - pwsh: |
                @(
                  'registry=${{ parameters.npmRegistry }}'
                  'always-auth=true'
                ) | Set-Content .npmrc
            displayName: 'Configure npm registry'
          - task: npmAuthenticate@0
            inputs:
                workingFile: .npmrc
            displayName: 'Authenticate npm feed'
          - script: npm ci --include=optional
            displayName: 'npm ci'
          - script: npm audit --production
            displayName: 'Run vulnerability scan'
          - script: npm run build
            displayName: 'npm run build'
          - task: CopyFiles@2
            displayName: 'Copy files to staging'
            inputs:
                sourceFolder: '$(Build.SourcesDirectory)'
                contents: |
                    bin/**
                    lib/**
                    src/**
                    templates/**
                    LICENSE
                    package.json
                    README.md
                    dist/plugin/**
                targetFolder: '$(Build.ArtifactStagingDirectory)/dropInput'
                cleanTargetFolder: true
          - pwsh: |
                $ErrorActionPreference = 'Stop'

                $connectionString = $env:APPLICATIONINSIGHTS_CONNECTION_STRING
                if ([string]::IsNullOrWhiteSpace($connectionString) -or $connectionString.StartsWith('$(')) {
                    Write-Host 'ApplicationInsightsConnectionString is not configured; package telemetry will remain disabled.'
                    exit 0
                }

                $placeholder = '__APPLICATIONINSIGHTS_CONNECTION_STRING__'
                $configPath = '$(Build.ArtifactStagingDirectory)/dropInput/lib/telemetry/config.js'
                if (-not (Test-Path $configPath)) {
                    throw "Telemetry runtime config was not found at $configPath"
                }

                $content = Get-Content -Raw -Path $configPath
                if (-not $content.Contains($placeholder)) {
                    throw "Telemetry connection string placeholder was not found in $configPath."
                }

                $escapedConnectionString = $connectionString.Replace('\', '\\').Replace("'", "\'")
                $content.Replace($placeholder, $escapedConnectionString) |
                    Set-Content -Path $configPath -Encoding utf8NoBOM
                Write-Host 'Injected the Application Insights connection string into package telemetry runtime.'
            displayName: 'Inject telemetry connection string'
            env:
                APPLICATIONINSIGHTS_CONNECTION_STRING: $(ApplicationInsightsConnectionString)
          - script: npm prune --production
            displayName: 'npm prune --production'
          - script: npm pack --ignore-scripts
            displayName: 'npm pack'
            workingDirectory: '$(Build.ArtifactStagingDirectory)/dropInput'
          - script: mkdir dropOutput && mv dropInput/*.tgz dropOutput
            displayName: 'Move package to dropOutput'
            workingDirectory: '$(Build.ArtifactStagingDirectory)'
