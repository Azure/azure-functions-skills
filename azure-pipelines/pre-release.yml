parameters:
    - name: NpmPublishTag
      displayName: 'Tag'
      type: string
      default: 'preview'
    - name: NpmPublishDryRun
      displayName: 'Dry Run'
      type: boolean
      default: true

trigger: none
pr: none

resources:
    repositories:
        - repository: 1es
          type: git
          name: 1ESPipelineTemplates/1ESPipelineTemplates
          ref: refs/tags/release

extends:
    template: v1/1ES.Official.PipelineTemplate.yml@1es
    parameters:
        sdl:
            sourceAnalysisPool:
                name: 1es-pool-azfunc
                image: 1es-windows-2022
                os: windows
            codeql:
                runSourceLanguagesInSourceAnalysis: true
        pool:
            name: 1es-pool-azfunc
            image: 1es-windows-2022
            os: windows

        stages:
            - stage: Build
              jobs:
                  - template: /azure-pipelines/templates/build.yml@self
                    parameters:
                        # Version to be published is specified in branch
                        IsPrerelease: false
            - stage: Release
              dependsOn: Build
              jobs:
                  - job: Release
                    steps:
                        - task: DownloadPipelineArtifact@2
                          inputs:
                              artifact: drop
                              path: $(Pipeline.Workspace)/drop
                          displayName: 'Download artifact'
                        - template: /azure-pipelines/templates/npm-publish-steps.yml@self
                          parameters:
                              tgzPath: '$(Pipeline.Workspace)/drop'
                              NpmPublishTag: ${{ parameters.NpmPublishTag }}
                              NpmPublishDryRun: ${{ parameters.NpmPublishDryRun }}
