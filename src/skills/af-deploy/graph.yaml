id: af-deploy
title: Deploy Azure Functions
suggestions:
  on_success:
    - target: af-create
      reason: "Add more functions to your deployed app."
      priority: 60
  on_failure:
    - target: af-setup
      reason: "Deployment failed — verify Azure CLI login and subscription."
      priority: 80
entry_conditions:
  - project_exists
  - ready_to_deploy
