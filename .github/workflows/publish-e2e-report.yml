name: Publish E2E Report

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/publish-e2e-report.yml'
      - 'reports/e2e/current/report.html'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  publish:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site
        shell: bash
        run: |
          set -euo pipefail
          test -f reports/e2e/current/report.html
          mkdir -p _site
          cp reports/e2e/current/report.html _site/index.html
          cp reports/e2e/current/report.html _site/report.html
          touch _site/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
