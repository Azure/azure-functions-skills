name: Publish & Release

on:
  workflow_dispatch:

jobs:
  publish:
    if: ${{ false }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Run tests
        run: npm test

      - name: Build plugins
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── GitHub Release with plugin zips ──

      - name: Package plugin zips
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd dist
          zip -r "../azure-functions-skills-ghcp-${VERSION}.zip" ghcp/
          zip -r "../azure-functions-skills-claude-${VERSION}.zip" claude/
          zip -r "../azure-functions-skills-codex-${VERSION}.zip" codex/

      - name: Render release notes
        run: |
          export VERSION="${GITHUB_REF_NAME#v}"
          envsubst '${VERSION}' < .github/RELEASE_NOTES_TEMPLATE.md > release_notes.md
          echo "--- Rendered release notes ---"
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: release_notes.md
          files: |
            azure-functions-skills-ghcp-*.zip
            azure-functions-skills-claude-*.zip
            azure-functions-skills-codex-*.zip
