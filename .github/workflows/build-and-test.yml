name: Build and Test

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/plugins/**'
      - '.plugin/**'
      - '.claude-plugin/**'
      - 'bin/**'
      - 'src/**'
      - 'templates/**'
      - 'tests/**'
      - 'eslint.config.js'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'tsconfig.typecheck.json'
      - 'vitest.config.ts'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/plugins/**'
      - '.plugin/**'
      - '.claude-plugin/**'
      - 'bin/**'
      - 'src/**'
      - 'templates/**'
      - 'tests/**'
      - 'eslint.config.js'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'tsconfig.typecheck.json'
      - 'vitest.config.ts'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Validate skills
        run: npm run validate:skills

      - name: Verify plugin payload
        run: npm run verify:plugin-payload

      - name: Run tests
        run: npm test

      - name: Build plugins
        run: npm run build

      - name: Verify build output
        run: |
          echo "=== GHCP ==="
          ls -la dist/workspace/ghcp/.github/
          test -f dist/workspace/ghcp/.mcp.json
          test ! -e dist/workspace/ghcp/.vscode/mcp.json
          echo "=== Claude ==="
          ls -la dist/workspace/claude/.claude/
          ls -la dist/workspace/claude/.claude/skills/
          echo "=== Codex ==="
          ls -la dist/workspace/codex/
          echo "=== Plugin payload ==="
          ls -la dist/plugin/azure-functions-skills/
          ls -la dist/plugin/azure-functions-skills/.plugin/
          ls -la dist/plugin/azure-functions-skills/skills/

      - name: Upload GHCP artifact
        uses: actions/upload-artifact@v7
        with:
          name: workspace-ghcp
          path: dist/workspace/ghcp/

      - name: Upload Claude artifact
        uses: actions/upload-artifact@v7
        with:
          name: workspace-claude
          path: dist/workspace/claude/

      - name: Upload Codex artifact
        uses: actions/upload-artifact@v7
        with:
          name: workspace-codex
          path: dist/workspace/codex/

      - name: Upload plugin payload artifact
        uses: actions/upload-artifact@v7
        with:
          name: plugin-azure-functions-skills
          path: dist/plugin/azure-functions-skills/
