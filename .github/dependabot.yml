version: 2
updates:
  # Security advisories for production and dev deps.
  # We intentionally do NOT enable noisy version-bump PRs — only security.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Only open PRs for vulnerabilities, not version bumps.
    # (Removing the version-update group makes Dependabot security-only.)
    groups:
      dev-dependencies:
        patterns:
          - "*"
        dependency-type: "development"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # GitHub Actions security updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(actions)"
